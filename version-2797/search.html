      <div class="wrap">

              <span>查询</span>
              <input id="query" type="text" placeholder="例如：日本、2025、动作、爱情、龙剑道">

  <script>
  (function() {
    var input = document.getElementById('query');
    var btn = document.getElementById('searchBtn');
    var results = document.getElementById('results');
    var empty = document.getElementById('empty');
    function esc(s) {
      return (s || '').replace(/[&<>"']/g, function(ch) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch];
      });
    }
    function poster(item) {
      var idx = parseInt(item.id, 10);
      var colors = [
        ['#0f172a','#14b8a6'],['#111827','#06b6d4'],['#1e1b4b','#7c3aed'],['#0f172a','#22c55e'],
        ['#111827','#f97316'],['#172554','#60a5fa'],['#1f2937','#f43f5e'],['#0b1120','#38bdf8']
      ];
      var c = colors[(idx - 1) % colors.length];
      return '<div class="poster poster-sm" style="--c1:' + c[0] + ';--c2:' + c[1] + ';">' +
        '<img src="' + item.cover + '" alt="' + esc(item.title) + ' 海报" loading="lazy" onerror="this.hidden=true;this.nextElementSibling.hidden=false;">' +
        '<div class="poster-fallback" hidden><span>' + esc(item.title.slice(0, 2) || '影视') + '</span></div>' +
        '</div>';
    }
    function card(item) {
      return '<article class="card card-grid">' +
        '<a class="card-link" href="' + item.href + '">' +
        poster(item) +
        '<div class="card-body">' +
        '<div class="card-meta"><span>' + esc(item.year) + '</span><span>' + esc(item.region) + '</span><span>' + esc(item.type) + '</span></div>' +
        '<h3 class="card-title">' + esc(item.title) + '</h3>' +
        '<p class="card-desc">' + esc(item.oneLine || '') + '</p>' +
        '</div></a></article>';
    }
    function run() {
      var q = input.value.trim().toLowerCase();
      var list = (window.__SEARCH_INDEX__ || []).filter(function(item) {
        if (!q) return true;
        var hay = [item.title, item.year, item.region, item.type, item.oneLine].join(' ').toLowerCase();
        return hay.indexOf(q) !== -1;
      });
      results.innerHTML = list.slice(0, 60).map(card).join('');
      empty.hidden = list.length !== 0;
    }
    input.addEventListener('input', run);
    btn.addEventListener('click', run);
    var params = new URLSearchParams(location.search);
    var q = params.get('q');
    if (q) input.value = q;
    run();
  })();
  </script>
